<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // Сохраняем путь, но добавляем /galaxy если его нет
      const path = location.pathname.startsWith('/galaxy') 
        ? location.pathname 
        : '/galaxy' + location.pathname;
      sessionStorage.redirect = path;
    </script>
    <meta http-equiv="refresh" content="0;URL='/galaxy/'" />
  </head>
  <body>
    Redirecting to application...
  </body>
</html>
